services:
  backend:
    build:
      context: ./backend
    ports:
      - "5001:5001"
    environment:
      APP_SECRET_KEY: dev-secret
      JWT_SECRET_KEY: dev-jwt-secret
      PORT: 5001

  frontend:
    build:
      context: ./frontend
    ports:
      - "8081:8081"
    environment:
      VITE_PROXY_TARGET: http://backend:5001
    depends_on:
      - backend
